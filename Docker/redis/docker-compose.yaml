version: '3.3'

services:
  redis:
    image: redis:latest
    networks:
      - evolution-net
    container_name: redis
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    # NO exponer puerto 6379 públicamente (seguridad)
    # Los contenedores en la red 'evolution-net' acceden usando: redis://redis:6379
    # Si necesitas acceso desde el host para debugging, descomenta la línea siguiente:
    # ports:
    #   - "127.0.0.1:6379:6379"

volumes:
  evolution_redis:


networks:
  evolution-net:
    name: evolution-net
    driver: bridge
